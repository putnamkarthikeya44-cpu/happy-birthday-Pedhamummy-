<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Pedhamummy ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111827;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

#locked,#unlocked{
    max-width:700px;
    padding:40px;
}

h1{
    font-size:3rem;
    margin-bottom:20px;
}

#countdown{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
    flex-wrap:wrap;
}

.time{
    background:#1f2937;
    padding:20px;
    border-radius:15px;
    width:120px;
}

.time span{
    display:block;
    font-size:2rem;
    font-weight:bold;
}

#unlocked{
    display:none;
}
button {
    margin : 30px;
    font-size: large;
    width: 170px;
    height:50px;
    border-radius: 20px ;
    color:white;
    background-color: rgba(27, 27, 27, 0.425);
    }
    button:hover{
    color:black;
    background-color: white;
     }
</style>
</head>

<body>

<div id="locked">

<h1>🎁 Birthday Surprise</h1>

<p>
This website will unlock when it's time...
</p>

<div id="countdown">

<div class="time">
<span id="days">0</span>
Days
</div>

<div class="time">
<span id="hours">0</span>
Hours
</div>

<div class="time">
<span id="minutes">0</span>
Minutes
</div>

<div class="time">
<span id="seconds">0</span>
Seconds
</div>

</div>

</div>


<div id="unlocked">

<h1>🎉 Happy Birthday Pedhamummy ❤️</h1>

<p>
The surprise has finally arrived!
</p>
  
<a href="birthday.html">
    <button>Open Surprise 🎁</button>
</a>
</div>

<script>

// SET YOUR DATE HERE
const unlockDate = new Date("july 20, 2026 08:00:00").getTime();

const timer = setInterval(() => {

    const now = new Date().getTime();

    const distance = unlockDate - now;

    if(distance <= 0){

        clearInterval(timer);

        document.getElementById("locked").style.display="none";
        document.getElementById("unlocked").style.display="block";

        return;
    }

    const days = Math.floor(distance/(1000*60*60*24));
    const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
    const seconds = Math.floor((distance%(1000*60))/1000);

    document.getElementById("days").textContent=days;
    document.getElementById("hours").textContent=hours;
    document.getElementById("minutes").textContent=minutes;
    document.getElementById("seconds").textContent=seconds;

},1000);

</script>

</body>
</html>
